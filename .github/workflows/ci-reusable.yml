name: Reusable CI

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '25'
      run-unit-tests:
        required: false
        type: boolean
        default: true
      run-integration-tests:
        required: false
        type: boolean
        default: true
      run-bdd-tests:
        required: false
        type: boolean
        default: true
      run-coverage:
        required: false
        type: boolean
        default: true
      coverage-threshold:
        required: false
        type: number
        default: 80

jobs:
  unit-tests:
    name: Unit Tests
    if: ${{ inputs.run-unit-tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'corretto'
          cache: maven
      - name: Run unit tests
        run: mvn test -Dgroups="unit"

  integration-tests:
    name: Integration Tests
    if: ${{ inputs.run-integration-tests }}
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'corretto'
          cache: maven
      - name: Run integration tests
        run: mvn test -Dgroups="integration"

  bdd-tests:
    name: BDD Tests
    if: ${{ inputs.run-bdd-tests }}
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'corretto'
          cache: maven
      - name: Run BDD tests
        run: mvn test -Dtest=CucumberTestRunner

  coverage:
    name: Coverage Check
    if: ${{ inputs.run-coverage }}
    needs: [ unit-tests, integration-tests ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'corretto'
          cache: maven
      - name: Check coverage threshold
        run: mvn verify -DskipTests
      - name: Check coverage percentage
        run: |
          COVERAGE=$(cat target/site/jacoco/jacoco.csv | awk -F',' '
            NR>1 {
              missed += $4 + $6
              covered += $5 + $7
            }
            END {
              total = missed + covered
              if (total > 0) printf "%.0f", (covered / total * 100)
              else print "0"
            }
          ')
          echo "Coverage: $COVERAGE%"
          if [ "$COVERAGE" -lt ${{ inputs.coverage-threshold }} ]; then
            echo "❌ Coverage $COVERAGE% is below the required ${{ inputs.coverage-threshold }}%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets the required ${{ inputs.coverage-threshold }}%"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/